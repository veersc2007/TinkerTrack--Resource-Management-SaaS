services:
  postgres:
    image: postgres:16-alpine
    container_name: tinkertrack-db
    environment:
      POSTGRES_USER: tinkertrack_user
      POSTGRES_PASSWORD: tinkertrack_password
      POSTGRES_DB: tinkertrack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinkertrack_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tinkertrack:
    build: .
    container_name: tinkertrack-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://tinkertrack_user:tinkertrack_password@postgres:5432/tinkertrack_db
      SECRET_KEY: your-secret-key-change-this-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
